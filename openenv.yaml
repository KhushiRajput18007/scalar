version: "1.0"
environment:
  name: "Cloud Cost Architect"
  description: "An AI agent provisions and terminates cloud servers to meet software requirements while minimizing costs."
  type: "python"
  entrypoint: "env:CloudCostEnv"
evaluation:
  tasks:
    - name: "easy"
      grader: "task_evaluators:grade_easy_task"
    - name: "medium"
      grader: "task_evaluators:grade_medium_task"
    - name: "hard"
      grader: "task_evaluators:grade_hard_task"

tasks:
  - id: "easy"
    name: "Easy Task"
    description: "Single Server Provisioning - find cheapest server with 8GB RAM"
    difficulty: "easy"
    config_file: "tasks/easy.json"
    grader: "task_evaluators:grade_easy_task"
  - id: "medium"
    name: "Medium Task"
    description: "Budget Fleet - exactly 3 servers under $100"
    difficulty: "medium"
    config_file: "tasks/medium.json"
    grader: "task_evaluators:grade_medium_task"
  - id: "hard"
    name: "Hard Task"
    description: "Price Spike / Auto-Scaling - handle midway cost increase"
    difficulty: "hard"
    config_file: "tasks/hard.json"
    grader: "task_evaluators:grade_hard_task"
